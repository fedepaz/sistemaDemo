services:
  mariadb-dev:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: vivero_dev
      MARIADB_USER: user
      MARIADB_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_dev_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb_buffer_pool_size=256M
      --max_connections=50

  mariadb-legacy:
    image: mariadb:10.1 # Match your legacy version (10.1.8-MariaDB)
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword

    ports:
      - "3307:3306" # Expose on different port to avoid conflict
    volumes:
      - mariadb_legacy_data:/var/lib/mysql
      - ./apps/backend/src/infra/legacy-mysql/init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=latin1
      --collation-server=latin1_swedish_ci
      --innodb_buffer_pool_size=256M
      --max_connections=50
      --sql-mode=NO_AUTO_VALUE_ON_ZERO

  valkey-dev:
    image: valkey/valkey:8-alpine
    command: valkey-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - valkey_dev_data:/data

volumes:
  mariadb_dev_data:
  mariadb_legacy_data: # ✅ NEW volume for legacy
  valkey_dev_data:
