worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Cloudflare IPs (update periodically)
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 104.16.0.0/13;
    # ... add all from https://www.cloudflare.com/ips/
    real_ip_header CF-Connecting-IP;

    server {
        listen 80;
        server_name _;  # Replace with your domain later

        # 🔐 Block sensitive files
        location ~ /\.(env|git|ht|svn|bak) { deny all; return 404; }

        # 🗂️ Static assets: cache aggressively
        location /_next/static/ {
            alias /var/www/public/_next/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
            expires 1M;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 🌐 Next.js frontend
        location / {
            proxy_pass http://nextjs:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 🔐 Rate limit login
        location /login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://nextjs:3000;
            # ... same headers as above
        }

        # ⚙️ NestJS API
        location /api {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 🔒 Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
    }


server {
    listen 80;
    server_name cabecitanegra.dpdns.org; # O podés dejar _ por ahora

    # Next.js frontend
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Necesario para WebSockets de Next.js (Hot Reload)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # NestJS API
    location /api {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://localhost:3001;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

