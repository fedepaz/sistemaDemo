services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443"  # When you add SSL
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites-available:/etc/nginx/sites-available:ro
    depends_on:
      - nextjs
      - api
    networks:
      - app-network

  nextjs:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001 # Use service name!
    networks:
      - app-network

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
